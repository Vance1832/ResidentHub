<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maintenance — ResidentHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>
<div class="app-shell">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-mark">
        <svg viewBox="0 0 16 16" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 14V6.5L8 2l6 4.5V14"/><path d="M6 14v-4h4v4"/></svg>
      </div>
      <span class="brand-name">ResidentHub</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-group">
        <a href="index.html" class="nav-item">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/></svg>
          Overview
        </a>
        <a href="residents.html" class="nav-item">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="5" r="3"/><path d="M1 14c0-3 2-5 5-5"/><circle cx="12" cy="9" r="2.5"/><path d="M9.5 14c0-2 1-3 2.5-3s2.5 1 2.5 3"/></svg>
          Residents
        </a>
        <a href="rooms.html" class="nav-item">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 14V6l6-4 6 4v8"/><path d="M6 14v-4h4v4"/></svg>
          Rooms
        </a>
        <a href="maintenance.html" class="nav-item active">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 3.5a3 3 0 0 1-4 4L2 11a2 2 0 1 0 3 3l3.5-3.5a3 3 0 0 1 4-4l-2 2 1.5 1.5 2-2z"/></svg>
          Maintenance
        </a>
        <a href="announcements.html" class="nav-item">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9H2a2 2 0 0 1 2-2V5a4 4 0 0 1 8 0v2a2 2 0 0 1 2 2z"/><path d="M6.5 12.5a1.5 1.5 0 0 0 3 0"/></svg>
          Announcements
        </a>
        <a href="analytics.html" class="nav-item">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 11 5 7 9 10 15 4"/><polyline points="11 4 15 4 15 8"/></svg>
          Analytics
        </a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar">AM</div>
        <div>
          <div class="user-info-name">Admin Manager</div>
          <div class="user-info-role">Property Admin</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <span class="topbar-title">Maintenance</span>
      <div class="topbar-sep"></div>
      <span class="topbar-crumb">Request tracker</span>
      <div class="topbar-search">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="4.5"/><path d="M11 11l2.5 2.5"/></svg>
        <input type="text" placeholder="Search…" />
      </div>
      <div class="topbar-actions"><div class="topbar-avatar">AM</div></div>
    </header>

    <div class="page">
      <div class="page-inner">

        <div class="page-head">
          <div class="page-head-left">
            <h1>Maintenance Requests</h1>
            <p id="maint-count-label">Loading…</p>
          </div>
          <button class="btn btn-primary" id="btn-add-maint">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v10M3 8h10"/></svg>
            New Request
          </button>
        </div>

        <!-- Summary bar -->
        <div class="maint-summary-bar" id="maint-summary-bar">
          <!-- Rendered by maintenance.js -->
        </div>

        <!-- Toolbar with status tabs -->
        <div class="toolbar" style="margin-bottom:var(--s3);">
          <div class="status-tabs" id="status-tabs">
            <button class="status-tab active" data-status="">
              All <span class="tab-count" id="tab-count-all">0</span>
            </button>
            <button class="status-tab" data-status="pending">
              Pending <span class="tab-count" id="tab-count-pending">0</span>
            </button>
            <button class="status-tab" data-status="in-progress">
              In Progress <span class="tab-count" id="tab-count-inprogress">0</span>
            </button>
            <button class="status-tab" data-status="completed">
              Completed <span class="tab-count" id="tab-count-completed">0</span>
            </button>
          </div>
        </div>

        <!-- Filter row -->
        <div class="toolbar">
          <div class="search-input-wrap">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="4.5"/><path d="M11 11l2.5 2.5"/></svg>
            <input type="text" placeholder="Search requests…" id="search-maint" />
          </div>
          <select class="filter-select" id="filter-priority">
            <option value="">All priorities</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
          <select class="filter-select" id="filter-category">
            <option value="">All categories</option>
            <option value="Plumbing">Plumbing</option>
            <option value="Electrical">Electrical</option>
            <option value="HVAC">HVAC</option>
            <option value="Appliance">Appliance</option>
            <option value="Structural">Structural</option>
            <option value="Other">Other</option>
          </select>
          <select class="filter-select" id="sort-maint">
            <option value="newest">Newest first</option>
            <option value="oldest">Oldest first</option>
            <option value="priority-high">Priority: High → Low</option>
            <option value="priority-low">Priority: Low → High</option>
          </select>
          <div class="toolbar-spacer"></div>
          <span style="font-size:11px;color:var(--text-3);" id="maint-showing-label"></span>
        </div>

        <!-- Requests table -->
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th style="width:16px;"></th><!-- priority dot -->
                <th>Resident</th>
                <th>Room</th>
                <th>Category</th>
                <th>Issue</th>
                <th>Status</th>
                <th>Submitted</th>
                <th style="text-align:right;">Actions</th>
              </tr>
            </thead>
            <tbody id="maint-tbody">
              <tr><td colspan="8"><div class="empty" style="padding:var(--s8)"><p>Loading…</p></div></td></tr>
            </tbody>
          </table>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- ── New / Edit Request Modal ───────────────────────── -->
<div class="modal-overlay" id="maint-modal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <span class="modal-title" id="maint-modal-title">New Maintenance Request</span>
      <button class="modal-close" data-close-modal>
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 4L4 12M4 4l8 8"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <form id="maint-form" novalidate>
        <input type="hidden" id="maint-id" />
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="maint-resident">Resident <span class="req">*</span></label>
            <select class="form-select" id="maint-resident">
              <option value="">Select resident…</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="maint-room">Room</label>
            <input type="text" class="form-input" id="maint-room" readonly />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="maint-category">Category <span class="req">*</span></label>
            <select class="form-select" id="maint-category">
              <option value="">Select…</option>
              <option value="Plumbing">Plumbing</option>
              <option value="Electrical">Electrical</option>
              <option value="HVAC">HVAC</option>
              <option value="Appliance">Appliance</option>
              <option value="Structural">Structural</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="maint-priority">Priority <span class="req">*</span></label>
            <select class="form-select" id="maint-priority">
              <option value="">Select…</option>
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="maint-description">Description <span class="req">*</span></label>
          <textarea class="form-textarea" id="maint-description" rows="3" placeholder="Describe the issue…"></textarea>
        </div>
        <div class="form-group" id="maint-status-group" style="display:none;">
          <label class="form-label" for="maint-status">Status</label>
          <select class="form-select" id="maint-status">
            <option value="pending">Pending</option>
            <option value="in-progress">In Progress</option>
            <option value="completed">Completed</option>
          </select>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-close-modal>Cancel</button>
      <button class="btn btn-primary" id="btn-save-maint">Submit request</button>
    </div>
  </div>
</div>

<div id="toast-root"></div>
<script src="js/storage.js"></script>
<script src="js/utils.js"></script>
<script src="js/maintenance.js"></script>
</body>
</html>
